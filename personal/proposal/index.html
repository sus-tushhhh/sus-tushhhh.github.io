<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Anti Rejection</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="images/jpeg" href="assets/fevicon.jpg" />
        <script src="script.js" type="text/javascript"></script>
    </head>
    <body onload="(set_text(), mobilePopup())" id="body">
        <header>
            <div id="fireworks">
                <img src="assets/heart fireworks.gif" /><img
                    src="assets/heart fireworks.gif"
                />
            </div>
            <div id="fireworks2"><img src="assets/heart fireworks.gif" /></div>
            <h1>
                <span id="heading"
                    >Will you be my
                    <span contenteditable="true" id="relation">gf</span> ?</span
                >
            </h1>
        </header>
        <main>
            <div id="ans">
                <button class="green" onclick="fireworks()">
                    Yes, Definitely 💘
                </button>
                <br /><br />
                <button
                    id="no"
                    class="red"
                    onmouseleave="mouseex()"
                    onmouseenter="teleport_random()"
                    onclick="no_click()"
                >
                    No, I don't <span id="loveto">love</span> you 😓
                </button>
            </div>
            <img id="hearts1" class="hearts" src="assets/hearts.gif" />
            <img id="hearts2" class="hearts" src="assets/hearts.gif" />
            <img id="hearts3" class="hearts" src="assets/hearts.gif" />
        </main>
    </body>
</html>
